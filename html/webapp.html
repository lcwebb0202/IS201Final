<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Temple Generator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eef5ff, #d8e7ff);
        color: #2c3e50;
    }

    /* Navigation */
    .nav {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
    }

    .nav a {
        text-decoration: none;
        color: #2c3e50;
        font-weight: 600;
        transition: color 0.3s;
    }

    .nav a:hover {
        color: #3d7eff;
    }

    /* Main Content */
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
    }

    h1 {
        margin-bottom: 30px;
        color: #1f3c88;
        font-size: 2.8rem;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        max-width: 700px;
        width: 90%;
    }

    #templeName {
        font-size: 2rem;
        margin-bottom: 15px;
        color: #1f3c88;
    }

    #templeImage {
        width: 100%;
        max-width: 600px;
        height: 350px;
        object-fit: cover;
        border-radius: 12px;
        border: 4px solid #e4ecff;
    }

    #templeDate {
        margin-top: 15px;
        font-size: 1.2rem;
        color: #555;
    }

    button {
        margin-top: 25px;
        padding: 14px 28px;
        font-size: 1rem;
        border: none;
        border-radius: 10px;
        background: #3d7eff;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        background: #245fdd;
        transform: translateY(-2px);
    }

    footer {
        margin-top: 25px;
        color: #777;
        font-size: 0.9rem;
    }
</style>
</head>
<body>

<div class="nav">
    <a href="../bootstrap/index.html">Resume</a>
    <a href="../index.html">Personal Project</a>
</div>

<div class="container">
    <h1>Random Temple Generator!</h1>

    <div class="card">
        <h2 id="templeName">Temple Name</h2>

        <img
            id="templeImage"
            src="Image1.jpg"
            alt="Temple Image"
        >

        <p id="templeDate">Dedicated: Month Day, Year</p>
    </div>

    <button onclick="generateTemple()">
        Generate Random Temple
    </button>

    <footer>
        Click the button to discover a random temple!
    </footer>
</div>

<script>
const temples = [
    {
        name: "Provo City Center",
        image: "../images/provo.jpeg",
        date: "March 20, 2016"
    },
    {
        name: "Mesa",
        image: "../images/mesa.jpeg",
        date: "December 12, 2021"
    },
    {
        name: "Los Angeles",
        image: "../images/LA.jpeg",
        date: "March 11, 1956"
    },
    {
        name: "Rexburg",
        image: "../images/rexburg.jpeg",
        date: "February 10, 2008"
    },
    {
        name: "Lindon",
        image: "../images/lindon.jpeg",
        date: "May 3, 2026"
    },
    {
        name: "DC",
        image: "../images/DC.jpeg",
        date: "August 14, 2022"
    },
    {
        name: "Mexico City",
        image: "../images/MexicoCity.jpeg",
        date: "September 13, 2015"
    },
    {
        name: "Manhattan",
        image: "../images/manhattan.jpeg",
        date: "June 13, 2004"
    },
    {
        name: "Snowflake",
        image: "../images/snowflake.jpeg",
        date: "March 3, 2002"
    },
    {
        name: "St. George",
        image: "../images/stgeorge.jpeg",
        date: "December 10, 2023"
    }
];

function generateTemple() {
    const randomIndex = Math.floor(Math.random() * temples.length);
    const temple = temples[randomIndex];

    document.getElementById("templeName").textContent = temple.name;
    document.getElementById("templeImage").src = temple.image;
    document.getElementById("templeImage").alt = temple.name;
    document.getElementById("templeDate").textContent =
        "Dedicated: " + temple.date;
}
</script>

</body>
</html>
